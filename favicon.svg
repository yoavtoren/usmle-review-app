<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#4338ca"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Stethoscope: chest piece (circle) -->
  <circle cx="38" cy="44" r="8" fill="none" stroke="white" stroke-width="3.5"/>
  <circle cx="38" cy="44" r="3" fill="white"/>

  <!-- Stethoscope: tube -->
  <path d="M30 44 Q20 44 20 32 Q20 20 28 20 Q36 20 36 28"
        fill="none" stroke="white" stroke-width="3.5" stroke-linecap="round"/>

  <!-- Stethoscope: earpieces split -->
  <line x1="28" y1="20" x2="22" y2="13" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <line x1="28" y1="20" x2="34" y2="13" stroke="white" stroke-width="3" stroke-linecap="round"/>
  <circle cx="22" cy="12" r="2.5" fill="white"/>
  <circle cx="34" cy="12" r="2.5" fill="white"/>
</svg>
