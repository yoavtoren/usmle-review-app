 else if(t.dataset.act==='step'){s.steps++;}
 else if(t.dataset.flip!=null){var f=+t.dataset.flip;s.flips[f]=!s.flips[f];}
 else if(t.dataset.diff){s.diff=t.dataset.diff;}
 render();
});
render();
})();
</script>
