<style>
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:#f3f4f6;color:#1c1f23;line-height:1.6;padding:18px}
.wrap{max-width:720px;margin:0 auto;background:#fff;border:1px solid #e3e6ea;border-radius:14px;
  box-shadow:0 1px 3px rgba(0,0,0,.06);padding:20px}
.back{display:inline-block;margin:0 auto 12px;max-width:720px;font-size:13px;color:#2563eb;text-decoration:none}
.head .pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px}
.pill{font-size:11px;background:#2563eb;color:#fff;border-radius:999px;padding:2px 9px}
.pill.ghost{background:#f3f4f6;color:#6b7280;border:1px solid #e3e6ea}
h2{margin:0 0 2px;font-size:20px}
.tabs{display:flex;gap:4px;flex-wrap:wrap;background:#f3f4f6;padding:5px;border-radius:10px;margin:14px 0}
.tab{flex:1;min-width:86px;border:none;background:transparent;color:#6b7280;border-radius:7px;padding:9px 6px;
  font-size:13px;font-weight:500;cursor:pointer}
.tab.active{background:#fff;color:#1c1f23;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.hint{font-size:12px;color:#6b7280;margin:4px 0 8px}
.stem{font-size:15.5px;line-height:1.85}
.clue{border:none;border-radius:5px;padding:0 4px;margin:0 1px;font:inherit;font-weight:600;cursor:pointer}
.clue.open{outline:2px solid currentColor;outline-offset:1px}
.inline-panel{display:block;margin:7px 0;padding:10px 12px;background:#f3f4f6;border-left:3px solid #2563eb;
  border-radius:0 8px 8px 0;font-size:13.5px;line-height:1.6}
.callout{background:#f3f4f6;border-radius:10px;padding:12px 14px;margin:12px 0;font-size:14px}
.callout.info{background:#e6f1fb}
.options{display:flex;flex-direction:column;gap:8px;margin-top:14px}
.option{text-align:left;border:1px solid #e3e6ea;background:#fff;border-radius:9px;padding:11px 13px;font-size:14px;cursor:pointer}
.option.locked{border-color:#2563eb;background:#e6f1fb}
.lockmsg{font-size:13px;color:#2563eb}
.elim{border:1px solid #e3e6ea;border-radius:9px;padding:12px 14px;margin-bottom:9px;cursor:pointer;font-size:14px}
.panel{background:#f3f4f6;border-radius:8px;padding:10px 12px;font-size:13.5px;margin-top:8px;color:#444}
.reveal{width:100%;padding:15px;border:2px solid #2563eb;background:#e6f1fb;color:#2563eb;border-radius:11px;
  font-size:15px;font-weight:600;cursor:pointer}
.banner{background:#eafaf0;color:#1a7f37;border-radius:11px;padding:13px 15px;font-size:16px;font-weight:600}
.ok{color:#1a7f37;font-weight:600}.bad{color:#b3261e;font-weight:600}.muted{color:#6b7280}
h3{font-size:15px;margin:18px 0 8px}
.chain{display:flex;flex-direction:column;gap:7px}
.chain-step{border-radius:8px;padding:10px 12px;font-size:14px}
.chain-next{align-self:flex-start;background:#f3f4f6;border:1px dashed #cdd2d8;color:#6b7280;border-radius:8px;
  padding:8px 12px;cursor:pointer;font-size:13px}
.memhook{background:#e6f1fb;border-radius:10px;padding:12px 14px;margin:14px 0;font-size:14.5px;color:#0c447c}
.review{border-top:1px solid #e3e6ea;margin-top:18px;padding-top:6px}
.diffgrid{display:flex;flex-direction:column;gap:7px}
.diff{text-align:left;border:1px solid #e3e6ea;background:#fff;border-radius:8px;padding:9px 12px;font-size:13.5px;cursor:pointer}
.diff.active{border-color:#2563eb;background:#e6f1fb}
.diffmsg{margin-top:10px;padding-top:10px;border-top:1px solid #e3e6ea;font-size:13.5px;line-height:1.6;color:#0c447c}
.cardgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.flip{min-height:92px;border-radius:10px;padding:14px;font-size:14px;line-height:1.45;cursor:pointer;
  background:#efeefe;color:#3c3489;text-align:left;border:1px solid #e3e6ea}
.flip.on{background:#e1f5ee;color:#0f6e56}
.fa{border:1px solid #e3e6ea;border-radius:10px;padding:12px 14px;margin-bottom:9px}
.fa-topic{font-weight:600;font-size:14.5px}.fa-loc{color:#444;font-size:13.5px;margin-top:3px;line-height:1.6}
.fatag{font-size:11px;font-weight:600;background:#f3f4f6;color:#6b7280;border-radius:999px;padding:2px 8px;margin-left:6px}
.panel{white-space:pre-line}
</style></head>

<script id="qdata" type="application/json">{"id": "q78", "item": 78, "qid": "10508", "title": "Root cause analysis: interview frontline staff", "system": "Patient Safety", "topic": "Quality improvement", "correct": "D", "yourAnswer": "B", "percentCorrect": 57, "vignette": "Over the next several months, there are more cases in which expired medications fail to be renewed. Finally, a patient on intravenous dobutamine for decompensated heart failure does not receive the medication for 6 hours and experiences worsening of her condition, with resulting hypotensive shock. Hospital administration convenes a committee to address this incident. Which of the following is the most appropriate next step in addressing this problem?", "clues": [{"text": "more cases in which expired medications fail to be renewed", "type": "red", "note": "A RECURRING, systemic failure (not a one-off) is the signal for a root cause analysis. Patterns of the same error across cases point to a process/system flaw, not a single careless person."}, {"text": "hypotensive shock", "type": "blue", "note": "A serious adverse outcome triggers a formal safety review. The harm escalates this from a near-miss to a sentinel-type event warranting structured investigation."}, {"text": "convenes a committee to address this incident", "type": "green", "note": "A committee tasked to 'address the problem' is doing quality improvement. The FIRST step of a root cause analysis is collecting data — interviewing the people involved to understand what, how, and why it happened, before designing fixes."}], "whatMatters": "This is a recurrent systemic error causing harm — the committee should run a root cause analysis, and its FIRST step is data collection: interviewing the frontline pharmacy, nursing, and medical staff on the units where it happened to learn what/how/why. Answer D.", "strategy": "Quality-improvement sequencing matters. A root cause analysis is RETROSPECTIVE and starts by gathering data (interview those involved) BEFORE jumping to a solution (alerts, double-checks). If two options are 'investigate' vs 'implement a fix,' the first step is usually to investigate the cause.", "options": [{"letter": "A", "text": "Create an alert system in the electronic medical record to notify physicians when orders expire", "correct": false}, {"letter": "B", "text": "Have a second pharmacist double-check expired orders", "correct": false}, {"letter": "C", "text": "Increase the hospital's risk management staffing", "correct": false}, {"letter": "D", "text": "Interview pharmacy, nursing, and medical staff on the units where this occurred", "correct": true}, {"letter": "E", "text": "Interview the patients who experienced adverse outcomes from these medication errors", "correct": false}], "eliminations": [{"letter": "A", "label": "EMR alert — a solution before the diagnosis (your B-logic too)", "detail": "WHAT IT IS: an automated expiry alert is a reasonable corrective measure. ❌ WHY IT FAILS: implementing a fix BEFORE identifying the root cause is premature; the real cause might be staffing/culture, not lack of an alert. ✅ Correct if: the question asked for a corrective action AFTER the root cause analysis identified the gap."}, {"letter": "B", "label": "second-pharmacist double-check — premature fix (your pick)", "detail": "WHAT IT IS: adding a redundant human check. ❌ WHY IT FAILS: same problem — it's a countermeasure chosen before understanding why renewals are missed; it may not address the true cause and adds workload. ✅ Correct if: the analysis had already pinpointed a missed-verification step as the cause."}, {"letter": "C", "label": "more risk-management staffing — addresses litigation, not the error", "detail": "WHAT IT IS: risk management handles liability/claims. ❌ WHY IT FAILS: more staff there doesn't fix the recurrent failure to renew orders; it's not a root cause step. ✅ Correct if: the goal were managing legal exposure rather than preventing recurrence."}, {"letter": "E", "label": "interview the patients — wrong data source", "detail": "WHAT IT IS: gathering the patient experience of the adverse outcome. ❌ WHY IT FAILS: patients can describe harm but not the process failures on the unit; the root cause lives in the staff workflow, so interview the staff involved. ✅ Correct if: the aim were disclosure or patient-experience review, not process analysis."}], "reasoning": ["Recurrent systemic error causing harm → do a root cause analysis", "RCA is retrospective and starts with data collection", "Data = interviewing the staff actually involved on the units", "Interview pharmacy/nursing/medical staff first → answer D"], "mechanism": "Root cause analysis (RCA) is a retrospective quality-improvement method to determine what, how, and why an adverse event occurred. The first step is collecting data by interviewing the multiple frontline staff involved to map the process and uncover underlying causes (e.g., understaffing, workflow gaps, hierarchical culture). Only after the cause is understood are targeted corrective measures (EMR alerts, redundant checks) designed and implemented. Compare with failure mode and effects analysis (FMEA), which is prospective.", "difficulty": [{"key": "knowledge", "label": "📚 Pure knowledge gap", "message": "First Aid Patient Safety/QI: root cause analysis (retrospective, identify what/how/why; data collection first) vs FMEA (prospective); PDSA cycles; types of error (active vs latent), Swiss-cheese model."}, {"key": "comprehension", "label": "🧭 Understanding the question", "message": "Reframe: 'first step' = understand the cause, not deploy a fix. Interviewing the people in the process is data collection — the start of RCA."}, {"key": "vocab", "label": "🔤 Vocabulary", "message": "Unsure on root cause analysis, FMEA, latent vs active error, quality improvement, sentinel event? Tell me which and I'll explain."}, {"key": "distractor", "label": "🧲 Pulled by a distractor", "message": "Options A and B are plausible FIXES (and B was your pick) — but RCA gathers data before solutions. 'First step' should beat any premature countermeasure."}, {"key": "other", "label": "✍️ Something else", "message": "Missed as B → remember the order: investigate (interview staff) → find root cause → THEN implement alerts/double-checks. Solutions come after diagnosis."}], "keywords": [{"front": "Recurrent systemic error causing harm → method", "back": "Root cause analysis (RCA)"}, {"front": "First step of RCA", "back": "Collect data — interview the staff involved"}, {"front": "RCA vs FMEA", "back": "RCA retrospective (after event); FMEA prospective (before)"}, {"front": "Swiss-cheese model", "back": "Multiple latent + active failures align to cause harm"}, {"front": "Active vs latent error", "back": "Active = at the sharp end (user); latent = system/design flaw"}, {"front": "PDSA cycle", "back": "Plan-Do-Study-Act iterative QI"}, {"front": "When to implement EMR alert/double-check", "back": "After RCA identifies the cause (corrective phase)"}], "firstAid": [{"tag": "answer", "topic": "Root cause analysis", "detail": "Patient Safety/QI: retrospective analysis, data collection by interviewing involved staff, identifying latent system causes."}, {"tag": "options", "topic": "QI tools & sequencing", "detail": "Patient Safety: FMEA (prospective), PDSA cycles, corrective measures (forcing functions, alerts, redundancy) come after cause identification."}, {"tag": "stem", "topic": "Medical error taxonomy", "detail": "Patient Safety: active vs latent errors, Swiss-cheese model, sentinel events, near-misses."}], "memoryHook": "Diagnose before you treat — even for systems. RCA starts by INTERVIEWING the frontline staff, not by bolting on an alert.", "stem": [{"text": "Over the next several months, there are "}, {"text": "more cases in which expired medications fail to be renewed", "clue": true, "type": "red", "note": "A RECURRING, systemic failure (not a one-off) is the signal for a root cause analysis. Patterns of the same error across cases point to a process/system flaw, not a single careless person."}, {"text": ". Finally, a patient on intravenous dobutamine for decompensated heart failure does not receive the medication for 6 hours and experiences worsening of her condition, with resulting "}, {"text": "hypotensive shock", "clue": true, "type": "blue", "note": "A serious adverse outcome triggers a formal safety review. The harm escalates this from a near-miss to a sentinel-type event warranting structured investigation."}, {"text": ". Hospital administration "}, {"text": "convenes a committee to address this incident", "clue": true, "type": "green", "note": "A committee tasked to 'address the problem' is doing quality improvement. The FIRST step of a root cause analysis is collecting data — interviewing the people involved to understand what, how, and why it happened, before designing fixes."}, {"text": ". Which of the following is the most appropriate next step in addressing this problem?"}]}</script>
<script>
(function(){
var q=JSON.parse(document.getElementById('qdata').textContent);
var BG={red:'#FCEBEB',orange:'#FAEEDA',blue:'#E6F1FB',green:'#EAF3DE',purple:'#FBEAF0'};
var FG={red:'#791F1F',orange:'#633806',blue:'#0C447C',green:'#27500A',purple:'#72243E'};
var STEPBG=['#FCEBEB','#E6F1FB','#F1EFE8','#EAF3DE','#FBEAF0'];
var STEPFG=['#791F1F','#0C447C','#2C2C2A','#27500A','#72243E'];
var TABS=[['q','📖 Question'],['e','🚫 Eliminate'],['a','🎯 Answer'],['k','🔑 Keywords'],['f','📚 First Aid']];
var DIFF=[['knowledge','📚 Pure knowledge gap'],['comprehension','🧭 Understanding the question'],
 ['vocab','🔤 Vocabulary'],['imaging','🖼️ Imaging / diagram'],['distractor','🧲 Pulled by a distractor'],['other','✍️ Something else']];
var s={tab:'q',clue:null,elim:null,locked:null,revealed:false,steps:0,flips:{},diff:null};
function esc(t){return (t==null?'':String(t)).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function diffMsg(k){
 var fa=(q.firstAid&&q.firstAid[0])?q.firstAid[0].location:'';
 if(k==='knowledge')return '📚 Go to First Aid: '+esc(fa)+'. Build flashcards from the Keywords tab and re-test.';
 if(k==='comprehension')return '🧭 '+esc(q.strategy||'Re-read the stem; identify exactly what is being asked.');
 if(k==='vocab')return '🔤 Note the unfamiliar term(s) in the stem and define them; the highlighted clues explain the key ones.';
 if(k==='imaging')return '🖼️ Practice the image/diagram type; review First Aid: '+esc(fa)+'.';
 if(k==='distractor')return '🧲 Re-read the Eliminate tab — learn why each trap is wrong before choosing.';
 return '✍️ Note what happened (timing, second-guessing, careless click) and adjust next time.';
}
function wrongOpts(){return q.options.filter(function(o){return !o.correct;});}
function correctOpt(){return q.options.filter(function(o){return o.correct;})[0];}
function render(){
 var H='';
 H+='<div class="head"><div class="pills"><span class="pill">#'+esc(q.item)+'</span>';
 H+='<span class="pill ghost">'+esc(q.system)+'</span><span class="pill ghost">'+esc(q.topic)+'</span>';
 if(q.percentCorrect!=null)H+='<span class="pill ghost">'+esc(q.percentCorrect)+'% got it right</span>';
 H+='</div><h2>'+esc(q.title)+'</h2></div>';
 H+='<div class="tabs">'+TABS.map(function(t){return '<button class="tab'+(s.tab===t[0]?' active':'')+'" data-tab="'+t[0]+'">'+t[1]+'</button>';}).join('')+'</div>';

 if(s.tab==='q'){
  H+='<div class="hint">👆 Tap any highlighted phrase in the stem to reveal why it matters</div><div class="stem">';
  (q.stem||[{text:q.vignette}]).forEach(function(seg,i){
    if(seg.clue){
      H+='<span><button class="clue'+(s.clue===i?' open':'')+'" data-clue="'+i+'" style="background:'+(BG[seg.type]||'#eee')+';color:'+(FG[seg.type]||'#333')+'">'+esc(seg.text)+'</button>';
      if(s.clue===i)H+='<span class="inline-panel">'+esc(seg.note)+'</span>';
      H+='</span>';
    } else H+=esc(seg.text);
  });
  H+='</div>';
  H+='<div class="callout"><strong>🧩 What actually matters:</strong> '+esc(q.whatMatters)+'</div>';
  H+='<div class="callout info"><strong>🧠 In these kinds of questions:</strong> '+esc(q.strategy)+'</div>';
  H+='<div class="options">'+q.options.map(function(o){return '<button class="option'+(s.locked===o.letter?' locked':'')+'" data-lock="'+o.letter+'"><b>'+o.letter+'</b> '+esc(o.text)+'</button>';}).join('')+'</div>';
  if(s.locked)H+='<p class="lockmsg">🔒 Locked in '+s.locked+'. Open the 🎯 Answer tab to check it.</p>';
 }

 if(s.tab==='e'){
  H+='<div class="hint">👆 Tap each wrong answer — what it is, why it fails, and when it WOULD be right</div>';
  wrongOpts().forEach(function(o){
   var el=(q.eliminations||[]).filter(function(e){return e.letter===o.letter;})[0];
   var lab=el?(el.label||el.what||''):'';
   var det=el?(el.detail|| (el.why?('WHY IT FAILS: '+el.why):'')):'';
   H+='<div class="elim" data-elim="'+o.letter+'"><div><b>'+o.letter+'</b> '+esc(o.text)+(lab?' — '+esc(lab):'')+'</div>';
   if(s.elim===o.letter&&det)H+='<div class="panel">'+esc(det)+'</div>';
   H+='</div>';
  });
 }

 if(s.tab==='a'){
  if(!s.revealed){H+='<button class="reveal" data-act="reveal">🎯 Reveal answer</button>';}
  else{
   var c=correctOpt();
   H+='<div class="banner">✅ '+c.letter+' · '+esc(c.text)+'</div>';
   if(s.locked)H+='<p class="'+(s.locked===q.correct?'ok':'bad')+'">'+(s.locked===q.correct?'🎉 Your locked guess '+s.locked+' is correct.':'Your locked guess was '+s.locked+' — correct answer is '+q.correct+'.')+'</p>';
   if(q.yourAnswer&&q.yourAnswer!==q.correct)H+='<p class="muted">On the real test you picked '+q.yourAnswer+'.</p>';
   H+='<h3>🧩 Reasoning chain</h3><div class="chain">';
   q.reasoning.slice(0,s.steps).forEach(function(st,i){H+='<div class="chain-step" style="background:'+STEPBG[Math.min(i,4)]+';color:'+STEPFG[Math.min(i,4)]+'">'+(i+1)+'. '+esc(st)+'</div>';});
   if(s.steps<q.reasoning.length)H+='<button class="chain-next" data-act="step">👆 Reveal step '+(s.steps+1)+'</button>';
   H+='</div>';
   H+='<div class="callout"><strong>⚙️ Mechanism:</strong> '+esc(q.mechanism)+'</div>';
   H+='<div class="memhook">🧠 '+esc(q.memoryHook)+'</div>';
   var DIFFS=(q.difficulty&&q.difficulty.length)?q.difficulty:DIFF.map(function(d){return {key:d[0],label:d[1],message:diffMsg(d[0])};});
   H+='<div class="review"><h3>🤔 What made this hard for you? Tap one to route your study:</h3><div class="diffgrid">';
   DIFFS.forEach(function(d){H+='<button class="diff'+(s.diff===d.key?' active':'')+'" data-diff="'+d.key+'">'+esc(d.label)+'</button>';});
   H+='</div>';
   if(s.diff){var dm=DIFFS.filter(function(d){return d.key===s.diff;})[0];if(dm)H+='<div class="diffmsg">'+esc(dm.message)+'</div>';}
   H+='</div>';
  }
 }

 if(s.tab==='k'){
  H+='<div class="hint">👆 Tap a card to flip · “If you see…” → “think…”</div><div class="cardgrid">';
  q.keywords.forEach(function(kw,i){
   H+='<button class="flip'+(s.flips[i]?' on':'')+'" data-flip="'+i+'">'+(s.flips[i]?'→ <b>'+esc(kw.back)+'</b>':'If you see:<br><b>'+esc(kw.front)+'</b>')+'</button>';
  });
  H+='</div>';
 }

 if(s.tab==='f'){
  H+='<div class="hint">📚 Where to review every topic in the stem AND the answer options</div>';
  q.firstAid.forEach(function(fa){
   H+='<div class="fa"><div class="fa-topic">'+esc(fa.topic)+(fa.tag?' <span class="fatag">'+esc(fa.tag)+'</span>':'')+'</div>'+
      '<div class="fa-loc">'+esc(fa.detail||fa.location||'')+'</div></div>';
  });
  H+='<div class="memhook">🧠 '+esc(q.memoryHook)+'</div>';
 }

 document.getElementById('w').innerHTML=H;
}
document.getElementById('w').addEventListener('click',function(ev){
 var t=ev.target.closest('[data-tab],[data-clue],[data-elim],[data-lock],[data-act],[data-flip],[data-diff]');
 if(!t)return;
 if(t.dataset.tab){s.tab=t.dataset.tab;}
 else if(t.dataset.clue!=null){var i=+t.dataset.clue;s.clue=s.clue===i?null:i;}
 else if(t.dataset.elim){s.elim=s.elim===t.dataset.elim?null:t.dataset.elim;}
 else if(t.dataset.lock){s.locked=t.dataset.lock;}
 else if(t.dataset.act==='reveal'){s.revealed=true;}
 else if(t.dataset.act==='step'){s.steps++;}
 else if(t.dataset.flip!=null){var f=+t.dataset.flip;s.flips[f]=!s.flips[f];}
 else if(t.dataset.diff){s.diff=t.dataset.diff;}
 render();
});
render();
})();
</script>
